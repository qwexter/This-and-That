name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run detekt
        run: |
          chmod +x gradlew
          ./gradlew detekt --no-daemon

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-konan-${{ runner.os }}-

      - name: Install SQLite3
        run: |
          sudo apt-get install -y libsqlite3-dev
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libsqlite3.so /usr/lib/libsqlite3.so

      - name: Run tests
        run: |
          chmod +x gradlew
          ./gradlew nativeTest --no-daemon

  build-backend:
    name: Build Backend
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-konan-${{ runner.os }}-

      - name: Install SQLite3
        run: |
          sudo apt-get install -y libsqlite3-dev
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libsqlite3.so /usr/lib/libsqlite3.so

      - name: Build release binary
        run: |
          chmod +x gradlew
          ./gradlew linkReleaseExecutableNative --no-daemon

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: build/bin/native/releaseExecutable/todo.kexe
          retention-days: 1

  build-web:
    name: Build Web
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: web

      - name: Type check
        run: npm run check
        working-directory: web

      - name: Build
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm run build
        working-directory: web

      - name: Upload web artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/build/
          retention-days: 1

  publish:
    name: Build & Push Image
    needs: [ build-backend, build-web ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: Dockerfile.ci
          sparse-checkout-cone-mode: false

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: dist/backend

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/web

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tat:latest
            ghcr.io/${{ github.repository_owner }}/tat:${{ github.sha }}
